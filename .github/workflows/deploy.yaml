name: Deploy Lake House Designer

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  SAM_STACK_NAME: lakehouse-designer
  S3_BUCKET_PREFIX: lakehouse-designer-frontend

permissions:
  contents: read

jobs:
  # ==================== BACKEND ====================
  deploy-backend:
    name: Deploy Backend (SAM)
    runs-on: ubuntu-latest
    outputs:
      frontend_bucket: ${{ steps.get-outputs.outputs.frontend_bucket }}
      cloudfront_id: ${{ steps.get-outputs.outputs.cloudfront_id }}
      api_endpoint: ${{ steps.get-outputs.outputs.api_endpoint }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM Validate
        working-directory: ./backend
        run: sam validate --template template.yaml

      - name: SAM Build
        working-directory: ./backend
        run: sam build --template template.yaml

      - name: SAM Deploy
        working-directory: ./backend
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides \
              FrontendBucketName=${{ env.S3_BUCKET_PREFIX }} \
              Environment=prd \
              TagCliente=FORCEONE \
              TagAmbiente=PRD \
              TagProjeto=LAKEHOUSE-DESIGNER \
              "TagAutor=ALBERTO MOREIRA"

      - name: Get CloudFormation outputs
        id: get-outputs
        run: |
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          CLOUDFRONT_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          API_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "frontend_bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT
          echo "api_endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT

  # ==================== FRONTEND ====================
  deploy-frontend:
    name: Deploy Frontend (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Create .env for build
        working-directory: ./frontend
        run: |
          echo "VITE_API_URL=${{ needs.deploy-backend.outputs.api_endpoint }}/generate-architecture" > .env
          echo "VITE_AWS_REGION=${{ env.AWS_REGION }}" >> .env

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync ./frontend/dist/ \
            s3://${{ needs.deploy-backend.outputs.frontend_bucket }} \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.deploy-backend.outputs.cloudfront_id }} \
            --paths "/*"

      - name: Print deploy URLs
        run: |
          echo "============================================"
          echo "Deploy concluído com sucesso!"
          echo "============================================"
          echo "CloudFront URL: https://$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontURL'].OutputValue" \
            --output text)"
          echo "API Endpoint: ${{ needs.deploy-backend.outputs.api_endpoint }}"
          echo "============================================"
